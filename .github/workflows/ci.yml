name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Swift Toolchain
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          swift package describe >/dev/null

      - name: Build Debug
        run: swift build

      - name: Build Release
        run: swift build -c release

      - name: Test
        run: swift test
