name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Swift Toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          SWIFT_VERSION="$(swift --version | sed -nE 's/.*Apple Swift version ([0-9]+\.[0-9]+).*/\1/p' | head -1)"
          if [[ -z "$SWIFT_VERSION" ]] || ! awk -v version="$SWIFT_VERSION" 'BEGIN { split(version, parts, "."); exit !((parts[1] > 6) || (parts[1] == 6 && parts[2] >= 2)) }'; then
            echo "Swift 6.2 or newer is required, got: $(swift --version | head -1)" >&2
            exit 1
          fi
          swift --version
          swift package describe >/dev/null

      - name: Build Debug
        run: swift build

      - name: Build Release
        run: swift build -c release

      - name: Test
        run: swift test
